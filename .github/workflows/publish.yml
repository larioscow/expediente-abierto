
name: publish
on:
  push:
    branches: [main]
    paths: ["web/**", "findings/**", "scripts/export_web_data.py"]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_psNY1kCDwuZDeuq7uT3NFcoH
  VERCEL_PROJECT_ID: prj_8fWGpwuu3KluRrIfCGvmQ3ODaU7R

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: token presente
        id: gate
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sin VERCEL_TOKEN: el despliegue lo hace la Mac. Job en verde."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/checkout@v4
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.gate.outputs.ok == 'true'
        run: pip install pandas
      - if: steps.gate.outputs.ok == 'true'
        run: python scripts/export_web_data.py
      - if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - if: steps.gate.outputs.ok == 'true'
        run: npm ci
        working-directory: web
      - if: steps.gate.outputs.ok == 'true'
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
      - if: steps.gate.outputs.ok == 'true'
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
      - if: steps.gate.outputs.ok == 'true'
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
